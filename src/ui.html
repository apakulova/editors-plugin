<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        --accent-color: #2f7f7a;
        --accent-color-hover: #276d69;
        --figma-color-bg: #ffffff;
        --figma-color-bg-brand: var(--accent-color);
        --figma-color-bg-brand-hover: var(--accent-color-hover);
        --figma-color-bg-hover: #f5f5f5;
        --figma-color-bg-secondary: #f7f7f5;
        --figma-color-border: #dbdbd9;
        --figma-color-border-brand: var(--accent-color);
        --figma-color-icon: #141414;
        --figma-color-text: #141414;
        --figma-color-text-disabled: #b8b8b8;
        --figma-color-text-onbrand: #ffffff;
        --figma-color-text-secondary: #757575;
        color-scheme: light dark;
        font-family: Manrope, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .tabs {
        align-items: end;
        border-bottom: 1px solid var(--figma-color-border);
        display: flex;
        gap: 22px;
        min-height: 50px;
        overflow: visible;
        padding: 7px 16px 0;
        position: relative;
      }

      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        color: var(--figma-color-text-secondary);
        cursor: pointer;
        font-size: 14px;
        font-weight: 800;
        height: 43px;
        line-height: 18px;
        padding: 0 0 8px;
        position: relative;
        text-align: center;
        white-space: nowrap;
      }

      .tab-label {
        position: relative;
      }

      .tab.active {
        color: var(--figma-color-text);
      }

      .tab.active::after {
        background: var(--figma-color-bg-brand);
        border-radius: 999px 68% 999px 72%;
        bottom: -4px;
        box-shadow: 0 1px 0 rgba(47, 127, 122, 0.16);
        content: "";
        height: 5px;
        left: -2px;
        position: absolute;
        right: -3px;
        transform: rotate(-0.9deg);
      }

      .tab:disabled {
        color: var(--figma-color-text-disabled);
        cursor: default;
      }

      .tab-doodles {
        bottom: 13px;
        height: 14px;
        left: calc(100% - 14px);
        pointer-events: none;
        position: absolute;
        width: 22px;
      }

      .tab-doodles span {
        background: var(--figma-color-bg-brand);
        border-radius: 999px;
        display: block;
        height: 1.5px;
        opacity: 0.9;
        position: absolute;
        transform-origin: center;
      }

      .tab-doodles span:nth-child(1) {
        left: 1px;
        top: 7px;
        transform: rotate(88deg);
        width: 10px;
      }

      .tab-doodles span:nth-child(2) {
        left: 10px;
        top: 4px;
        transform: rotate(-55deg);
        width: 13px;
      }

      .tab-doodles span:nth-child(3) {
        left: 15px;
        top: 11px;
        transform: rotate(-32deg);
        width: 7px;
      }

      .content {
        display: grid;
        gap: 20px;
        padding: 24px 16px 12px;
      }

      .group {
        display: grid;
        gap: 14px;
      }

      .group-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 20px;
      }

      .mode-list {
        display: grid;
        gap: 12px;
      }

      .mode {
        align-items: start;
        cursor: pointer;
        display: flex;
        gap: 12px;
      }

      .mode input {
        height: 1px;
        opacity: 0;
        position: absolute;
        width: 1px;
      }

      .radio-mark {
        background: #e1e1df;
        border: 0;
        border-radius: 50%;
        flex: 0 0 auto;
        height: 24px;
        margin-top: -1px;
        position: relative;
        transition: background 120ms ease;
        width: 24px;
      }

      .radio-mark::after {
        background-image: url("data:image/svg+xml,%3Csvg width='16' height='12' viewBox='0 0 16 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 6.15L6.02 9.72L14 1.28' stroke='white' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        content: "";
        height: 12px;
        left: 50%;
        opacity: 0;
        position: absolute;
        top: calc(50% + 0.7px);
        transform: translate(-50%, -50%);
        transition: opacity 120ms ease, transform 120ms ease;
        width: 16px;
      }

      .mode input:checked + .radio-mark {
        background: var(--figma-color-bg-brand);
      }

      .mode input:checked + .radio-mark::after {
        opacity: 1;
        transform: translate(-50%, -50%);
      }

      .mode input:focus-visible + .radio-mark {
        box-shadow: 0 0 0 2px rgba(47, 127, 122, 0.22);
      }

      .mode-content {
        display: grid;
        gap: 3px;
        padding-top: 1px;
      }

      .mode-name {
        font-size: 14px;
        font-weight: 700;
        line-height: 18px;
      }

      .mode-text {
        color: var(--figma-color-text-secondary);
        font-size: 12px;
        line-height: 17px;
      }

      .nbsp-star {
        color: #ff4053;
        font-weight: 800;
      }

      .option {
        align-items: start;
        background: transparent;
        border: 0;
        cursor: pointer;
        display: grid;
        gap: 8px;
        grid-template-columns: 16px 1fr;
        padding: 0;
      }

      .option input {
        appearance: none;
        background: #ffffff;
        border: 1px solid #b8b8b8;
        border-radius: 4px;
        height: 16px;
        margin: 1px 0 0;
        position: relative;
        width: 16px;
      }

      .option input:checked {
        background: var(--figma-color-bg-brand);
        border-color: var(--figma-color-bg-brand);
      }

      .option input:checked::after {
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='8' viewBox='0 0 10 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1.2 4.15L3.8 6.45L8.8 1.15' stroke='white' stroke-width='1.9' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-position: center;
        background-repeat: no-repeat;
        background-size: 100% 100%;
        content: "";
        height: 8px;
        left: 50%;
        position: absolute;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 10px;
      }

      .option input:focus-visible {
        box-shadow: 0 0 0 2px rgba(47, 127, 122, 0.22);
      }

      .option-title {
        display: block;
        font-size: 13px;
        font-weight: 400;
        line-height: 18px;
      }

      .option-text {
        color: var(--figma-color-text-secondary);
        display: block;
        font-size: 11px;
        line-height: 16px;
        margin-top: 2px;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: auto;
        padding: 12px 16px 16px;
      }

      .primary {
        appearance: none;
        background: var(--figma-color-bg-brand);
        border: 0;
        border-radius: 8px;
        color: var(--figma-color-text-onbrand);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        height: 32px;
        padding: 0 14px;
        width: 100%;
      }

      .primary:hover {
        background: var(--figma-color-bg-brand-hover);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="tabs" aria-label="Разделы настроек">
        <button class="tab active" type="button">Типограф</button>
        <button class="tab" type="button" disabled>Правила</button>
        <button class="tab" type="button" disabled>
          <span class="tab-label">
            О плагине
            <span class="tab-doodles" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </span>
          </span>
        </button>
      </nav>

      <section class="content">
        <div class="group">
          <div class="group-title">Как подготовить текст?</div>
          <div class="mode-list" role="radiogroup" aria-label="Режим типографа">
            <label class="mode" for="beautyMode">
              <input id="beautyMode" name="typographMode" type="radio" value="beauty" checked />
              <span class="radio-mark" aria-hidden="true"></span>
              <span class="mode-content">
                <span class="mode-name">Для красоты</span>
                <span class="mode-text">Поставит готовые символы</span>
              </span>
            </label>
            <label class="mode" for="developmentMode">
              <input id="developmentMode" name="typographMode" type="radio" value="development" />
              <span class="radio-mark" aria-hidden="true"></span>
              <span class="mode-content">
                <span class="mode-name">Для разработки</span>
                <span class="mode-text">Покажет <span class="nbsp-star">*</span> на&nbsp;месте неразрывных пробелов</span>
              </span>
            </label>
          </div>
        </div>

        <label class="option" for="processLocked">
          <input id="processLocked" type="checkbox" />
          <span>
            <span class="option-title">Обработать даже слои с замочком</span>
          </span>
        </label>

      </section>

      <div class="actions">
        <button class="primary" id="run" type="button">Запустить типограф</button>
      </div>
    </main>

    <script>
      const runButton = document.getElementById("run");
      const processLocked = document.getElementById("processLocked");

      runButton.addEventListener("click", () => {
        const selectedMode = document.querySelector('input[name="typographMode"]:checked');

        parent.postMessage(
          {
            pluginMessage: {
              type: "run-typograph",
              options: {
                mode: selectedMode ? selectedMode.value : "beauty",
                processLockedNodes: processLocked.checked,
              },
            },
          },
          "*"
        );
      });
    </script>
  </body>
</html>
