<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <title>Превью UI Чистовика</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Manrope, Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        align-items: center;
        background: #f1f2f4;
        color: #141414;
        display: flex;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 32px;
      }

      .preview {
        display: grid;
        gap: 14px;
      }

      .window {
        background: #ffffff;
        border: 1px solid #dbdbd9;
        border-radius: 14px;
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.14);
        overflow: hidden;
        width: 360px;
      }

      .window-bar {
        align-items: center;
        display: grid;
        grid-template-columns: 24px 1fr 24px;
        gap: 10px;
        height: 52px;
        padding: 0 14px;
      }

      .window-icon {
        height: 24px;
        overflow: hidden;
        width: 24px;
      }

      .window-icon img {
        display: block;
        height: 100%;
        width: 100%;
      }

      .window-title {
        font-size: 16px;
        font-weight: 800;
        line-height: 20px;
      }

      .window-close {
        color: #141414;
        font-size: 30px;
        font-weight: 300;
        line-height: 24px;
        text-align: center;
      }

      iframe {
        border: 0;
        display: block;
        height: 340px;
        width: 360px;
      }

    </style>
  </head>
  <body>
    <main class="preview">
      <section class="window" aria-label="Локальное превью окна плагина">
        <div class="window-bar">
          <div class="window-icon">
            <img src="../assets/plugin-icon.svg" alt="" />
          </div>
          <div class="window-title">Чистовик</div>
          <div class="window-close">×</div>
        </div>
        <iframe id="pluginPreview" title="UI Чистовика"></iframe>
      </section>
    </main>

    <script>
      const pluginPreview = document.getElementById("pluginPreview");
      const version = window.location.search || "?v=preview";

      pluginPreview.src = `../src/ui.html${version}`;

      window.addEventListener("message", (event) => {
        if (!event.data || !event.data.pluginMessage) {
          return;
        }
      });
    </script>
  </body>
</html>
