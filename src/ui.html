<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--figma-color-bg);
        color: var(--figma-color-text);
      }

      button,
      input {
        font: inherit;
      }

      .shell {
        display: flex;
        min-height: 100vh;
        flex-direction: column;
      }

      .header {
        align-items: center;
        border-bottom: 1px solid var(--figma-color-border);
        display: flex;
        gap: 12px;
        padding: 16px;
      }

      .mark {
        align-items: center;
        background: var(--figma-color-bg-brand);
        border-radius: 8px;
        color: var(--figma-color-text-onbrand);
        display: flex;
        flex: 0 0 auto;
        font-size: 18px;
        font-weight: 700;
        height: 36px;
        justify-content: center;
        width: 36px;
      }

      .heading {
        min-width: 0;
      }

      .title {
        font-size: 16px;
        font-weight: 700;
        line-height: 22px;
      }

      .subtitle {
        color: var(--figma-color-text-secondary);
        font-size: 12px;
        line-height: 18px;
      }

      .close {
        align-items: center;
        appearance: none;
        background: transparent;
        border: 0;
        border-radius: 6px;
        color: var(--figma-color-icon);
        cursor: pointer;
        display: flex;
        flex: 0 0 auto;
        height: 28px;
        justify-content: center;
        margin-left: auto;
        padding: 0;
        width: 28px;
      }

      .close:hover {
        background: var(--figma-color-bg-hover);
      }

      .tabs {
        border-bottom: 1px solid var(--figma-color-border);
        display: grid;
        grid-template-columns: repeat(3, 1fr);
      }

      .tab {
        appearance: none;
        background: transparent;
        border: 0;
        border-bottom: 2px solid transparent;
        color: var(--figma-color-text-secondary);
        font-size: 12px;
        font-weight: 600;
        height: 40px;
        padding: 0 8px;
        text-align: center;
      }

      .tab.active {
        border-color: var(--figma-color-bg-brand);
        color: var(--figma-color-text);
      }

      .tab:disabled {
        cursor: default;
        opacity: 0.55;
      }

      .content {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .group {
        display: grid;
        gap: 8px;
      }

      .group-title {
        font-size: 12px;
        font-weight: 700;
        line-height: 18px;
      }

      .mode-grid {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr 1fr;
      }

      .mode {
        align-items: flex-start;
        appearance: none;
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        border-radius: 8px;
        color: var(--figma-color-text);
        cursor: pointer;
        display: grid;
        gap: 4px;
        min-height: 88px;
        padding: 11px;
        text-align: left;
      }

      .mode.active {
        border-color: var(--figma-color-border-brand, var(--figma-color-bg-brand));
        box-shadow: inset 0 0 0 1px var(--figma-color-border-brand, var(--figma-color-bg-brand));
      }

      .mode:disabled {
        cursor: default;
        opacity: 0.58;
      }

      .mode-name {
        font-size: 12px;
        font-weight: 700;
        line-height: 18px;
      }

      .mode-text {
        color: var(--figma-color-text-secondary);
        font-size: 11px;
        line-height: 16px;
      }

      .option {
        align-items: flex-start;
        background: var(--figma-color-bg-secondary);
        border: 1px solid var(--figma-color-border);
        border-radius: 8px;
        cursor: pointer;
        display: grid;
        gap: 10px;
        grid-template-columns: 16px 1fr;
        padding: 12px;
      }

      .option input {
        accent-color: var(--figma-color-bg-brand);
        height: 14px;
        margin: 2px 0 0;
        width: 14px;
      }

      .option-title {
        font-size: 12px;
        font-weight: 700;
        line-height: 18px;
      }

      .option-text {
        color: var(--figma-color-text-secondary);
        font-size: 11px;
        line-height: 16px;
        margin-top: 2px;
      }

      .status {
        background: var(--figma-color-bg-secondary);
        border-radius: 8px;
        color: var(--figma-color-text-secondary);
        font-size: 11px;
        line-height: 16px;
        padding: 10px 12px;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: auto;
        padding: 16px;
      }

      .primary {
        appearance: none;
        background: var(--figma-color-bg-brand);
        border: 0;
        border-radius: 6px;
        color: var(--figma-color-text-onbrand);
        cursor: pointer;
        font-size: 12px;
        font-weight: 600;
        height: 32px;
        padding: 0 14px;
        width: 100%;
      }

      .primary:hover {
        background: var(--figma-color-bg-brand-hover);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div class="mark">Ч</div>
        <div class="heading">
          <div class="title">Чистовик</div>
          <div class="subtitle">Типографика для редакторской проверки</div>
        </div>
        <button class="close" id="close" type="button" aria-label="Закрыть">×</button>
      </header>

      <nav class="tabs" aria-label="Разделы настроек">
        <button class="tab active" type="button">Типограф</button>
        <button class="tab" type="button" disabled>Правила</button>
        <button class="tab" type="button" disabled>О плагине</button>
      </nav>

      <section class="content">
        <div class="group">
          <div class="group-title">Режим</div>
          <div class="mode-grid" role="radiogroup" aria-label="Режим типографа">
            <button class="mode active" id="beautyMode" type="button" role="radio" aria-checked="true">
              <span class="mode-name">Для красоты</span>
              <span class="mode-text">Готовые символы: кавычки, тире и неразрывные пробелы.</span>
            </button>
            <button class="mode" type="button" role="radio" aria-checked="false" disabled>
              <span class="mode-name">Для разработки</span>
              <span class="mode-text">Скоро: покажет неразрывные пробелы звёздочками.</span>
            </button>
          </div>
        </div>

        <label class="option" for="processLocked">
          <input id="processLocked" type="checkbox" />
          <span>
            <span class="option-title">Обрабатывать заблокированные слои</span>
            <span class="option-text">По умолчанию замочки считаются намерением не менять текст.</span>
          </span>
        </label>

        <div class="status">
          Быстрый запуск без окна остаётся в основном режиме. Эти настройки применяются только при запуске из этого окна.
        </div>
      </section>

      <div class="actions">
        <button class="primary" id="run" type="button">Запустить Чистовик</button>
      </div>
    </main>

    <script>
      const closeButton = document.getElementById("close");
      const runButton = document.getElementById("run");
      const processLocked = document.getElementById("processLocked");

      closeButton.addEventListener("click", () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      });

      runButton.addEventListener("click", () => {
        parent.postMessage(
          {
            pluginMessage: {
              type: "run-typograph",
              options: {
                mode: "beauty",
                processLockedNodes: processLocked.checked,
              },
            },
          },
          "*"
        );
      });
    </script>
  </body>
</html>
